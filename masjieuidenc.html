<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="robots" content="noindex, nofollow">
    <title>MASJIE STORE | Premium FF Account</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{background:radial-gradient(circle at 20% 0%,#0a0a12 0%,#050508 100%);font-family:'Inter',sans-serif;color:#fff;min-height:100vh;user-select:none;-webkit-user-select:none}
        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-track{background:rgba(255,255,255,0.02)}
        ::-webkit-scrollbar-thumb{background:#38bdf8;border-radius:10px}
        .loader-wrapper{position:fixed;inset:0;background:#050508;display:flex;justify-content:center;align-items:center;z-index:9999;transition:opacity .6s cubic-bezier(0.4,0,0.2,1)}
        .loader-ring{position:relative;width:60px;height:60px}
        .loader-ring div{position:absolute;width:100%;height:100%;border-radius:50%;border:2px solid transparent;animation:spin 1.2s cubic-bezier(0.5,0,0.5,1) infinite}
        .loader-ring div:nth-child(1){border-top-color:#38bdf8;animation-delay:-0.3s}
        .loader-ring div:nth-child(2){border-right-color:#ec4899;animation-delay:-0.15s}
        .loader-ring div:nth-child(3){border-bottom-color:#fbbf24}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        .glass-header{position:sticky;top:0;background:rgba(5,5,8,0.75);backdrop-filter:blur(20px);border-bottom:1px solid rgba(56,189,248,0.15);padding:16px 24px;z-index:100}
        .logo-wrapper{display:flex;align-items:baseline;justify-content:center;gap:8px}
        .logo-main{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,#fff,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .logo-badge{font-size:0.65rem;background:rgba(56,189,248,0.2);padding:2px 8px;border-radius:40px;color:#38bdf8;font-weight:600}
        .hero-premium{text-align:center;padding:40px 24px 32px}
        .hero-premium h1{font-size:2.2rem;font-weight:800;background:linear-gradient(145deg,#fff 0%,#94a3b8 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.5px}
        .hero-premium .hero-tag{display:inline-block;margin-top:12px;padding:6px 14px;background:rgba(56,189,248,0.12);border:1px solid rgba(56,189,248,0.25);border-radius:40px;font-size:0.7rem;font-weight:600;color:#38bdf8;letter-spacing:1px}
        .search-premium{max-width:480px;margin:0 auto 24px;padding:0 20px}
        .search-container{background:rgba(18,20,28,0.8);backdrop-filter:blur(8px);border-radius:60px;border:1px solid rgba(56,189,248,0.2);transition:all .3s ease}
        .search-container:focus-within{border-color:#38bdf8;box-shadow:0 0 20px rgba(56,189,248,0.15)}
        .search-input{width:100%;background:transparent;border:none;padding:14px 22px;color:#fff;font-size:0.9rem;outline:none}
        .search-input::placeholder{color:#5a5f73}
        .tabs-elegant{display:flex;justify-content:center;gap:12px;padding:0 20px 28px;flex-wrap:wrap}
        .tab-premium{padding:8px 24px;border-radius:40px;background:rgba(18,20,28,0.6);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.05);color:#9ca3af;font-weight:600;font-size:0.8rem;cursor:pointer;transition:all .3s cubic-bezier(0.4,0,0.2,1)}
        .tab-premium i{margin-right:6px;font-size:0.75rem}
        .tab-premium.active{background:linear-gradient(135deg,#38bdf8,#3b82f6);color:#fff;border-color:transparent;box-shadow:0 4px 15px rgba(56,189,248,0.35)}
        .section-header-glow{padding:0 24px;margin:35px 0 16px;display:flex;align-items:center;gap:14px}
        .section-header-glow span{font-size:0.7rem;font-weight:700;letter-spacing:2px;color:#a0aec0}
        .glow-line{flex:1;height:1px;background:linear-gradient(90deg,#38bdf8,transparent)}
        .grid-premium{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px;padding:0 20px 40px;max-width:800px;margin:0 auto}
        .card-premium{background:linear-gradient(145deg,rgba(20,22,32,0.9),rgba(12,14,20,0.95));backdrop-filter:blur(4px);border-radius:24px;border:1px solid rgba(255,255,255,0.06);overflow:hidden;transition:all .4s cubic-bezier(0.2,0.9,0.4,1.1);position:relative}
        .card-premium::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 0%,rgba(56,189,248,0.1),transparent);opacity:0;transition:opacity .4s}

        .id-number{font-size:0.9rem;font-weight:800;letter-spacing:0.5px;background:linear-gradient(135deg,#fff,#cbd5e1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:8px 0 4px}
